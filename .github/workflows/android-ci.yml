name: Android CI

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"

  push:
    branches:
      - main
    paths:
      - "android/**"

jobs:
  android-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew lint

      - name: Unit Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew assembleDebug